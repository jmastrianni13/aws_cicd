name: Rust CD Pipeline

on:
  workflow_call:
    secrets:
      EC2_USER:
        required: true
      EC2_KEY:
        required: true
    inputs:
      EC2_HOST:
        required: true
        type: string
        description: 'Public IP for EC2 instance'
permissions:
  id-token: write
  contents: read
  pull-requests: write
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2

      - name: Install zig (for cross-compiling)
        uses: goto-bus-stop/setup-zig@v2.2.0
        with:
          version: "0.15.2"

      - name: Download zigbuild
        shell: bash
        run: |
          cargo install --locked cargo-zigbuild

      - name: Add targets
        shell: bash
        run: |
          rustup target add aarch64-unknown-linux-musl

      - name: Build aarch64 binary
        shell: bash
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Set up SSH Key
        shell: bash
        run: |
          echo "${{ secrets.EC2_KEY }}" > ~/RustSimpleServer.pem
          chmod 400 ~/RustSimpleServer.pem

      - name: Push updated binary to target
        shell: bash
        run: |
          scp -o StrictHostKeyChecking=no -i ~/secret_key.pem -r target/aarch64-unknown-linux-musl/release/search ${{ secrets.EC2_USER }}@${{ inputs.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/service


